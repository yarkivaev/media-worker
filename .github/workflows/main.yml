name: Publish to Maven Central

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Setup GPG
        run: |
          echo "$PGP_SECRET" | base64 --decode > secret.asc
          gpg --batch --import secret.asc

      - name: Configure SBT credentials
        run: |
          mkdir -p ~/.sbt/1.0
          echo "credentials += Credentials(\"Sonatype Nexus Repository Manager\", \"s01.oss.sonatype.org\", \"${{ secrets.SONATYPE_USERNAME }}\", \"${{ secrets.SONATYPE_PASSWORD }}\")" > ~/.sbt/1.0/sonatype.sbt

      - name: Publish to Maven Central
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          echo "pgpPassphrase := Some(\"$PGP_PASSPHRASE\".toCharArray)" > ~/.sbt/gpg.sbt
          sbt clean +publishSigned sonatypeBundleRelease
