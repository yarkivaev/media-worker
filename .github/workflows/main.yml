name: Publish to Maven Central

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Setup sbt
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Setup GPG
        run: |
          echo "$PGP_SECRET" | base64 --decode > secret.asc
          gpg --batch --import secret.asc
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}

      - name: Configure SBT credentials
        run: |
          mkdir -p ~/.sbt/1.0
          cat > ~/.sbt/1.0/sonatype.sbt << EOF
          credentials += Credentials(
            "Sonatype Nexus Repository Manager",
            "s01.oss.sonatype.org",
            "${{ secrets.SONATYPE_USERNAME }}",
            "${{ secrets.SONATYPE_PASSWORD }}"
          )
          EOF

      - name: Setup PGP keys
        run: |
          mkdir -p ~/.sbt
          echo "pgpPassphrase := Some(\"${{ secrets.PGP_PASSPHRASE }}\".toCharArray)" > ~/.sbt/1.0/gpg.sbt

      - name: Run tests
        run: sbt test

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$TAG" >> $GITHUB_ENV
          echo "Setting version to $TAG"

      - name: Update version in build.sbt for tag releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sed -i "s/version := \".*\"/version := \"$VERSION\"/" build.sbt

      - name: Publish snapshot (on push to master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: sbt clean publishSigned

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sbt clean publishSigned
          sbt sonatypeBundleRelease
